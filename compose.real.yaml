services:
  presentation:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: PresentationLayer1/PresentationLayer1.csproj
        APP_DLL: PresentationLayer1.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5080
      DATABASE_URL: Data Source=/app/App_Data/school_events.db
      JWT_SECRET: dev-only-insecure-secret-change-before-any-real-deployment
      JWT_ISSUER: school-events
      JWT_AUDIENCE: school-events
      JWT_EXPIRES_MINUTES: "120"
      MOCK_LOGIN: "false"
      MockApiBaseUrl: http://localhost:5080/api/
    ports:
      - "5080:5080"
    volumes:
      - presentation-data:/app/App_Data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: Worker/Worker.csproj
        APP_DLL: Worker.dll
    environment:
      DATABASE_URL: Data Source=/app/App_Data/school_events.db
      WORKER_POLL_SECONDS: "5"
      WORKER_BATCH_SIZE: "10"
    depends_on:
      - presentation
    volumes:
      - presentation-data:/app/App_Data

volumes:
  presentation-data:
